<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashLearn - Apprendre comme Quizlet</title>
    <style>
        :root {
            --primary: #4255ff;
            --primary-hover: #2b3de6;
            --bg: #f6f7fb;
            --text: #303545;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* --- Zone de Flashcard --- */
        .card-container {
            perspective: 1000px;
            height: 300px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-radius: 20px;
            background: var(--card-bg);
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            border: 2px solid #e0e0e0;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #f5f7ff 0%, #e8ecff 100%);
            color: var(--primary);
        }

        /* --- Contrôles --- */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        #progress {
            font-weight: 600;
            color: #646f8a;
        }

        /* --- Mode Quiz --- */
        .quiz-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .quiz-section h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .option-btn {
            background-color: #f0f2f9;
            color: var(--text);
            text-align: left;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
        }

        .option-btn:hover {
            background-color: #e4e8f7;
        }

        .correct {
            background-color: #2ed573 !important;
            color: white;
        }

        .wrong {
            background-color: #ff4757 !important;
            color: white;
        }

        .score-display {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2ed573;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>FlashLearn</h1>
        <p>Apprends tes définitions en t'amusant</p>
    </header>

    <div class="container">
        <div class="card-container" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front" id="card-front">Terme</div>
                <div class="card-face card-back" id="card-back">Définition</div>
            </div>
        </div>

        <div class="controls">
            <button id="prev-btn" onclick="prevCard()">Précédent</button>
            <span id="progress">1 / 5</span>
            <button id="next-btn" onclick="nextCard()">Suivant</button>
        </div>

        <hr style="border: 0; height: 1px; background: #dcdde1; margin: 40px 0;">

        <div class="quiz-section">
            <h3>Mode Entraînement / Quiz</h3>
            <div id="quiz-question" style="font-weight: 600; font-size: 1.1rem; margin-bottom: 15px;">Question ici...</div>
            <div class="options-grid" id="quiz-options">
                </div>
            <div class="score-display" id="score-text"></div>
        </div>
    </div>

    <script>
        // --- DONNÉES DES CARTES (Tu peux les modifier ici !) ---
        const flashcards = [
            { term: "Navigateur Web", definition: "Un logiciel qui permet de consulter des pages web (ex: Chrome, Firefox)." },
            { term: "HTML", definition: "Le langage de balisage utilisé pour structurer le contenu d'une page web." },
            { term: "CSS", definition: "Le langage utilisé pour styliser et mettre en page les documents HTML." },
            { term: "JavaScript", definition: "Un langage de programmation qui rend les pages web interactives et dynamiques." },
            { term: "Serveur", definition: "Un ordinateur puissant qui stocke et distribue les données d'un site web aux utilisateurs." }
        ];

        let currentIndex = 0;
        let score = 0;

        // Éléments DOM
        const cardEl = document.getElementById('card');
        const frontEl = document.getElementById('card-front');
        const backEl = document.getElementById('card-back');
        const progressEl = document.getElementById('progress');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        const quizQuestionEl = document.getElementById('quiz-question');
        const quizOptionsEl = document.getElementById('quiz-options');
        const scoreTextEl = document.getElementById('score-text');

        // --- FONCTIONS FLASHCARDS ---
        function updateCard() {
            // Remettre la carte à l'endroit avant de changer le texte
            cardEl.classList.remove('flipped');
            
            setTimeout(() => {
                frontEl.textContent = flashcards[currentIndex].term;
                backEl.textContent = flashcards[currentIndex].definition;
                progressEl.textContent = `${currentIndex + 1} / ${flashcards.length}`;
                
                // Activer/Désactiver boutons
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === flashcards.length - 1;
            }, 150); // Petit délai pour l'effet visuel
        }

        function flipCard() {
            cardEl.classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // --- FONCTIONS QUIZ ---
        function generateQuiz() {
            const currentQuestion = flashcards[currentIndex];
            quizQuestionEl.textContent = `Que signifie : "${currentQuestion.term}" ?`;
            quizOptionsEl.innerHTML = '';
            scoreTextEl.style.display = 'none';

            // Mélanger les réponses (la bonne + 2 fausses au hasard)
            let options = [currentQuestion.definition];
            let wrongOptions = flashcards
                .filter(card => card.definition !== currentQuestion.definition)
                .map(card => card.definition);
            
            // Prendre maximum 2 fausses réponses au hasard
            wrongOptions.sort(() => 0.5 - Math.random());
            options.push(...wrongOptions.slice(0, 2));
            
            // Mélanger le tableau final d'options
            options.sort(() => 0.5 - Math.random());

            // Créer les boutons d'options
            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option;
                button.onclick = () => checkAnswer(button, option, currentQuestion.definition);
                quizOptionsEl.appendChild(button);
            });
        }

        function checkAnswer(selectedButton, selectedOption, correctOption) {
            const allButtons = quizOptionsEl.querySelectorAll('.option-btn');
            
            // Désactiver tous les boutons après le clic
            allButtons.forEach(btn => btn.disabled = true);

            if (selectedOption === correctOption) {
                selectedButton.classList.add('correct');
                score++;
            } else {
                selectedButton.classList.add('wrong');
                // Montrer quand même la bonne réponse
                allButtons.forEach(btn => {
                    if (btn.textContent === correctOption) btn.classList.add('correct');
                });
            }
        }

        // Initialisation au chargement de la page
        updateCard();
        generateQuiz();

        // Écouter les changements de cartes pour mettre à jour le quiz aussi
        nextBtn.addEventListener('click', generateQuiz);
        prevBtn.addEventListener('click', generateQuiz);
    </script>
</body>
</html>
